<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot Home Screen</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            margin-top: 20px;
            color: #343a40;
            font-weight: 700;
        }

        .card {
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-weight: 600;
            color: #007bff;
        }

        .chat-card {
            height: 400px;
            overflow-y: auto;
        }

        .chat-card p {
            background: #e9ecef;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            border-radius: 10px;
            background: linear-gradient(90deg, #4b6cb7, #182848);
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <center>
            <h1>ChatBot Home Screen</h1>
        </center>

        <div class="row">
            <!-- ChatBot Response Section -->
            <div class="col-md-8">
                <div class="card chat-card" id="chatContainer">
                    <div class="card-body">
                        <h5 class="card-title">ChatBot</h5>
                        <a href="#" class="btn btn-primary">Start Chatting</a>
                    </div>
                </div>
            </div>

            <!-- User Input Section -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Ask Questions</h5>
                        <form action="" method="post">
                            <input type="text" id="user_input" placeholder="Ask me anything..." name="user_question"
                                class="form-control mb-3">
                            <button type="submit" onclick="getChat(event)" class="btn btn-primary w-100">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <script>
        const getChat = async (e) => {
            e.preventDefault();  // <-- prevent form from submitting and refreshing the page
            const chatContainer = document.querySelector('#chatContainer .card-body');
            const paragraph = document.createElement('p');
            chatContainer.appendChild(paragraph);  // <-- append inside the card

            const user_iput = document.getElementById('user_input').value;  // <-- get user input value
            console.log("User input:", user_iput);  // <-- log user input to console
user_iput.value = '';  // <-- clear input field after sending


                 try {
                const response = await fetch('http://127.0.0.1:8000/chats/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: `${user_iput}` })
                });
                

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                let result = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    result += chunk;

                    // update UI live
                    paragraph.innerText = result;
                }


            } catch (error) {
                console.error('Error fetching data:', error);
            }
       
        }

    </script>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
