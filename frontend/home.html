<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Assistant</title>

<style>
:root {
    --primary: #7b2d26;
    --secondary: #d9a441;
    --bg: linear-gradient(135deg, #f6f4f1, #efeae4);
    --glass: rgba(255, 255, 255, 0.6);
    --text: #2c2c2c;
}

/* Global */
body {
    margin: 0;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* App */
.app {
    width: 100%;
    max-width: 420px;
    height: 92vh;
    backdrop-filter: blur(15px);
    background: var(--glass);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.header {
    background: linear-gradient(135deg, #7b2d26, #a63e36);
    color: white;
    padding: 16px;
    text-align: center;
    position: relative;
}

.header img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 5px;
    border: 2px solid white;
}

.header h2 {
    margin: 4px 0;
    font-size: 18px;
}

.header p {
    font-size: 12px;
    opacity: 0.8;
}

/* Status dot */
.status {
    position: absolute;
    right: 15px;
    top: 20px;
    width: 10px;
    height: 10px;
    background: #2ecc71;
    border-radius: 50%;
    box-shadow: 0 0 8px #2ecc71;
}

/* Chat */
.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* Messages */
.message {
    max-width: 75%;
    padding: 12px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #7b2d26, #a63e36);
    color: white;
    border-bottom-right-radius: 6px;
}

.bot {
    align-self: flex-start;
    background: white;
    border-bottom-left-radius: 6px;
}

/* Input area */
.input-area {
    padding: 10px;
    background: transparent;
}

.input-box {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 30px;
    padding: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.input-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 10px;
    border-radius: 30px;
    font-size: 14px;
}

.input-box button {
    border: none;
    background: linear-gradient(135deg, #d9a441, #c8932f);
    color: white;
    padding: 10px 16px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.input-box button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

/* Footer branding */
.footer {
    text-align: center;
    font-size: 11px;
    color: #777;
    padding-top: 5px;
}

/* Scrollbar */
.chat::-webkit-scrollbar {
    width: 5px;
}
.chat::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(6px);}
    to {opacity: 1; transform: translateY(0);}
}

.footer {
    text-align: center;
    font-size: 22px;
    color: #888;
    margin-top: 6px;
    letter-spacing: 0.3px;
}

.brand {
    color: #7b2d26;
    font-weight: 700;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
}

/* Elegant underline animation */
.brand::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #d9a441, #7b2d26);
    transition: width 0.3s ease;
}

.brand:hover::after {
    width: 100%;
}

.brand:hover {
    color: #a63e36;
}

</style>
</style>
</head>

<body>
<div class="app">
    
    <div class="header">
        <span class="status"></span>
        <img src="../assets/image.png" alt="Restaurant">
        <h2>Restaurant Assistant</h2>
        <p>Smart food & menu assistant</p>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="input" placeholder="Ask about dishes, prices...">
            <button id="send">Send</button>
        </div>
<div class="footer">
    Created by 
    <a href="https://www.youtube.com/@CodewithAfidhu" target="_blank" class="brand">
        CodewithAfidhu
    </a>
</div>
    </div>

</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

const addMessage = (text, type) => {
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
};

const sendMessage = async () => {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage(text, 'user');

    const botMsg = addMessage('Typing...', 'bot');

    try {
        const response = await fetch('http://127.0.0.1:8000/chats/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let result = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            result += decoder.decode(value);
            botMsg.innerText = result;
        }

    } catch (err) {
        botMsg.innerText = "⚠️ Server error. Please try again.";
    }
};

sendBtn.onclick = sendMessage;

input.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
